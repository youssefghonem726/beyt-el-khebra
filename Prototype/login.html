<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bayt El Khebra | Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page">
  <div class="auth-shell">
    <aside class="auth-side">
      <div>
        <h2 class="logo">Bayt El Khebra</h2>
        <div style="margin-top: 60px;">
          <h3>Welcome to Bayt El Khebra</h3>
          <p class="muted">Manage your orders easily and track every step of the printing process.</p>
        </div>
      <p class="tiny muted">© 2025 Bayt El Khebra. All rights reserved.</p>
    </aside>

    <main class="auth-main">
      <section class="auth-card">
        <h1 class="center">Welcome Back!</h1>
        <p class="center muted">Login to your account</p>

        <div class="field">
          <label>Email Address</label>
          <input class="input" type="email" placeholder="Enter your email">
        </div>
        <div class="field">
          <label>Password</label>
          <input class="input" type="password" placeholder="Enter your password">
        </div>

        <div class="table-head">
          <label class="tiny"><input type="checkbox"> Remember me</label>
          <a class="tiny" href="client/support.html">Forgot Password?</a>
        </div>

        <a class="btn primary block center" href="owner/index.html">Login</a>
        <p class="center muted tiny">or</p>
        <a class="btn block center" href="#">Login with Google</a>
        <p class="center tiny">Don't have an account? <a href="create-account.html"><strong>Create Account</strong></a></p>
      </section>
    </main>
  </div>
</body>
</html>
