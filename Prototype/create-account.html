<!DOCTYPE html>

<head>

  <style>
/* Inlined styles.css */

ea,button{font:inherit}.input,.select,.textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 12px;background:#fff}.textarea{min-height:88px;resize:vertical}.btn{border:1px solid var(--border);border-radius:8px;padding:10px 12px;background:#fff;cursor:pointer}.btn.primary{background:#2b313b;color:#fff;border-color:#2b313b}.btn.block{width:100%}table{width:100%;border-collapse:collapse}th,td{font-size:13px;text-align:left;padding:11px 8px;border-bottom:1px solid #eef0f4}th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.4px}.status{display:inline-block;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:700}.status.pending{background:#f3edc8}.status.progress{background:#dce8fb}.status.done{background:#d9f1db}.status.hold{background:#efe6d9}.status.delivery-on-time{background:#d9f1db;color:#1f7a35}.status.delivery-delayed{background:#fde8c9;color:#9b5a00}.status.delivery-lost{background:#ffd8d8;color:#a11818}.box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}.box h3{margin-bottom:10px}.box p{color:var(--muted);font-size:14px}.box ul{list-style:none;color:#4f5661;display:grid;gap:8px;font-size:14px}.box .btn+.btn{margin-top:8px}.split{display:grid;grid-template-columns:2.2fr 1fr;gap:14px}.form-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.form-grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.field{display:grid;gap:6px}.field label{font-size:13px;color:#4d5560}.section-title{margin:2px 0 10px;font-size:20px}.upload-zone{border:2px dashed #d8dbe2;border-radius:10px;padding:26px;text-align:center;color:var(--muted);background:var(--surface-soft)}.order-layout{display:grid;grid-template-columns:1.9fr 1fr;gap:14px}.client-card{display:flex;gap:12px;align-items:center}.avatar{width:56px;height:56px;border:1px solid var(--border);border-radius:10px;background:#f0f2f6}.spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px}.spec-grid p{font-size:14px}.spec-grid span{display:block;color:var(--muted);margin-top:3px}.audit{list-style:none;display:grid;gap:10px}.audit li{display:flex;justify-content:space-between;color:#4c5360;font-size:14px}.line{height:1px;background:var(--border);margin:12px 0}.production-layout{display:grid;grid-template-columns:2.3fr 1fr;gap:14px}.progress-bar{height:9px;border-radius:999px;background:#e4e8ee;overflow:hidden}.progress-bar>span{display:block;height:100%;background:#2f333b}.progress-green>span{background:#2c9a4b}.progress-orange>span{background:#e89023}.progress-red>span{background:#d43c3c}.client-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.client-card-link{display:block;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}.client-card-link h3{margin-bottom:4px}.client-card-link p{color:var(--muted);font-size:13px}.client-profile{scroll-margin-top:16px}.stats-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.stat-item{border:1px solid var(--border);border-radius:10px;background:var(--surface-soft);padding:10px}.stat-item p{color:var(--muted);font-size:12px}.stat-item h4{margin-top:4px;font-size:18px}.track-header{max-width:760px;margin:0 auto 16px;text-align:center}.public-nav{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 26px}.public-nav-links{display:flex;gap:18px;color:#474e5a;font-size:14px}.track-shell{max-width:1180px;margin:0 auto;padding:20px 18px}.center-card{max-width:700px;margin:0 auto 18px}.auth-shell{min-height:100vh;display:grid;grid-template-columns:300px 1fr}.auth-side{border-right:1px solid var(--border);background:var(--surface);padding:26px 18px;display:flex;flex-direction:column;justify-content:space-between}.auth-main{display:grid;place-items:center;padding:24px}.auth-card{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;display:grid;gap:10px}.muted{color:var(--muted)}.tiny{font-size:12px}.center{text-align:center}.footer{color:var(--muted);font-size:12px;padding:14px 0}@media(max-width:1180px){.grid-4,.client-grid,.stats-grid,.form-grid,.form-grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}.content,.split,.order-layout,.production-layout{grid-template-columns:1fr}}@media(max-width:860px){.app-shell{flex-direction:column}.sidebar{width:100%}.grid-4{grid-template-columns:1fr}.client-grid,.stats-grid{grid-template-columns:1fr}.auth-shell{grid-template-columns:1fr}}
</style>
</head>
<body class="page">
  <div class="auth-shell">
    <aside class="auth-side">
      <div>
        <h2 class="logo">PRINTAPP</h2>
        <div style="margin-top: 60px;">
          <h3>Welcome to PrintApp</h3>
          <p class="muted">Manage your orders easily and track every step of the printing process.</p>
        </div>
      </div>
      <p class="tiny muted">© 2025 PrintApp. All rights reserved.</p>
    </aside>

    <main class="auth-main">
      <section class="auth-card">
        <h1 class="center">Create Account</h1>
        <p class="center muted">Register to get started</p>

        <div class="field">
          <label>Full Name</label>
          <input class="input" type="text" placeholder="Enter your full name">
        </div>
        <div class="field">
          <label>Email Address</label>
          <input class="input" type="email" placeholder="Enter your email">
        </div>
        <div class="field">
          <label>Password</label>
          <input class="input" type="password" placeholder="Create a password">
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input class="input" type="password" placeholder="Confirm your password">
        </div>

        <label class="tiny"><input type="checkbox"> I agree to the Terms of Service and Privacy Policy</label>
        <a class="btn primary block center" href="index.html">Create Account</a>
        <p class="center muted tiny">or</p>
        <a class="btn block center" href="#">Sign up with Google</a>
        <p class="center tiny">Already have an account? <a href="login.html"><strong>Login</strong></a></p>
      </section>
    </main>
  </div>
</body>
</html>
