<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bayt El Khebra | Profile Settings</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="page">
  <div class="app-shell">
    <aside class="sidebar" data-nav="client">
      <h2 class="logo">Bayt El Khebra</h2>
      <nav></nav>
      <div class="sidebar-footer"><a class="logout-link" href="../login.html">Log Out</a></div>
    </aside>
    <main class="main">
      <header class="topbar"><h1>Profile Settings</h1><p class="topbar-user">Ahmed Store</p></header>
      <section class="split">
        <article class="box">
          <h3>Account Information</h3>
          <div class="form-grid-2">
            <div class="field"><label>Store Name</label><input class="input" type="text" value="Ahmed Store"></div>
            <div class="field"><label>Email</label><input class="input" type="email" value="ahmed@store.com"></div>
            <div class="field"><label>Phone</label><input class="input" type="text" value="+20 101 000 1021"></div>
            <div class="field"><label>Address</label><input class="input" type="text" value="Cairo, Egypt"></div>
          <a class="btn primary" href="#">Save Changes</a>
        </article>
        <aside class="box">
          <h3>Security</h3>
          <div class="field"><label>Current Password</label><input class="input" type="password" placeholder="Current password"></div>
          <div class="field"><label>New Password</label><input class="input" type="password" placeholder="New password"></div>
          <a class="btn block" href="#">Update Password</a>
        </aside>
      </section>
    </main>
  </div>
  <script src="../components/nav-data.js"></script>
  <script src="../components/nav-loader.js"></script>
</body>
</html>
