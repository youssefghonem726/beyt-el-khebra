<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bayt El Khebra | Support</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="page">
  <div class="app-shell">
    <aside class="sidebar" data-nav="client">
      <h2 class="logo">Bayt El Khebra</h2>
      <nav></nav>
      <div class="sidebar-footer"><a class="logout-link" href="../login.html">Log Out</a></div>
    </aside>
    <main class="main">
      <header class="topbar"><h1>Support</h1><p class="topbar-user">Ahmed Store</p></header>
      <section class="split">
        <article class="box">
          <h3>Contact Support</h3>
          <div class="field"><label>Subject</label><input class="input" type="text" placeholder="What do you need help with?"></div>
          <div class="field"><label>Order ID (optional)</label><input class="input" type="text" placeholder="e.g. #1021"></div>
          <div class="field"><label>Message</label><textarea class="textarea" placeholder="Describe your issue..."></textarea></div>
          <a class="btn primary" href="#">Send Message</a>
        </article>
        <aside class="box">
          <h3>Direct Channels</h3>
          <ul>
            <li>Email: support@baytelkhebra.com</li>
            <li>Phone: +20 100 000 0000</li>
            <li>Working Hours: 9:00 AM - 6:00 PM</li>
          </ul>
          <div class="line"></div>
          <a class="btn block" href="track-order.html">Track an Order</a>
          <a class="btn block" href="place-new-order.html">Create New Order</a>
        </aside>
      </section>
    </main>
  </div>
  <script src="../components/nav-data.js"></script>
  <script src="../components/nav-loader.js"></script>
</body>
</html>
