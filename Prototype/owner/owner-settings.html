<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bayt El Khebra | Owner Settings</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="page">
  <div class="app-shell">
    <aside class="sidebar" data-nav="owner">
      <h2 class="logo"><span class="logo-mark">Logo</span><span class="logo-name">Bayt El Khebra</span><span class="logo-sub">Bayt El Khebra</span></h2>
      <nav></nav>
      <div class="sidebar-footer"><a class="logout-link" href="../login.html">Log Out</a></div>
    </aside>
    <main class="main">
      <header class="topbar"><h1>Owner Settings</h1><p class="topbar-user">Administration</p></header>
      <section class="stack">
        <article class="box">
          <h3>Pricing Roles</h3>
          <div class="form-grid-2">
            <div class="field"><label>Pricing Owner</label><input class="input" type="text" value="Senior Manager"></div>
            <div class="field"><label>Approval Threshold (EGP)</label><input class="input" type="number" value="5000"></div>
          </div>
        </article>
        <article class="box">
          <h3>Notification Format (WhatsApp Integration)</h3>
          <div class="field"><label>WhatsApp Business Number</label><input class="input" type="text" value="+20 100 123 4455"></div>
          <div class="field"><label>Message Template</label><textarea class="textarea">Hello {{client_name}}, your order {{order_id}} is now {{status}}.</textarea></div>
        </article>
        <article class="box">
          <h3>User Management</h3>
          <table>
            <thead><tr><th>User</th><th>Role</th><th>Status</th><th>Action</th></tr></thead>
            <tbody>
              <tr><td>owner@baytelkhebra.com</td><td>Owner</td><td><span class="status done">ACTIVE</span></td><td><a class="btn" href="#">Edit</a></td></tr>
              <tr><td>manager@baytelkhebra.com</td><td>Manager</td><td><span class="status done">ACTIVE</span></td><td><a class="btn" href="#">Edit</a></td></tr>
              <tr><td>production@baytelkhebra.com</td><td>Production</td><td><span class="status progress">ACTIVE</span></td><td><a class="btn" href="#">Edit</a></td></tr>
            </tbody>
          </table>
        </article>
      </section>
    </main>
  </div>
  <script src="../components/nav-data.js"></script>
  <script src="../components/nav-loader.js"></script>
</body>
</html>
