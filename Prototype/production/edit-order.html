<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bayt El Khebra | Edit Order</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="page">
  <div class="app-shell">
    <aside class="sidebar" data-nav="manager">
      <h2 class="logo"><span class="logo-mark">Logo</span><span class="logo-name">Bayt El Khebra</span><span class="logo-sub">Bayt El Khebra</span></h2>
      <nav></nav>
      <div class="sidebar-footer"><a class="logout-link" href="../login.html">Log Out</a></div>
    </aside>
    <main class="main">
      <header class="topbar"><h1>Edit Order #1033</h1><p class="topbar-user">Manager</p></header>
      <section class="box">
        <div class="form-grid">
          <div class="field"><label>Client Name</label><input class="input" type="text" value="Client Name"></div>
          <div class="field"><label>Batch Code</label><input class="input" type="text" value="B-260426-P"></div>
          <div class="field"><label>Status</label><select class="select"><option>UNPRICED</option><option>PENDING</option><option>IN_PROGRESS</option><option>COMPLETED</option></select></div>
          <div class="field"><label>Product</label><input class="input" type="text" value="Packaging Sleeves"></div>
          <div class="field"><label>Quantity</label><input class="input" type="number" value="2500"></div>
          <div class="field"><label>Deadline</label><input class="input" type="date"></div>
        </div>
        <div class="line"></div>
        <div class="actions-inline">
          <a class="btn primary" href="manager-order-details.html">Save Changes</a>
          <a class="btn" href="manager-order-details.html">Cancel</a>
        </div>
      </section>
    </main>
  </div>
  <script src="../components/nav-data.js"></script>
  <script src="../components/nav-loader.js"></script>
</body>
</html>
