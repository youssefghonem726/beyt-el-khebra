<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bayt El Khebra | Delivery Actions</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="page">
  <div class="track-shell">
    <section class="box center-card">
      <h2>Delivery Actions - Order #1021</h2>
      <p class="muted">Use these actions to update delivery status and shipping details.</p>
      <div class="line"></div>

      <div class="stack">
        <a class="btn primary block" href="#">Mark as Delivered</a>
        <a class="btn block" href="#">Reschedule Delivery Date</a>
        <a class="btn block" href="#">Cancel Delivery</a>
        <a class="btn block" href="#">Change Address</a>
      </div>

      <div class="line"></div>
      <div class="field">
        <label>New Delivery Date</label>
        <input class="input" type="date">
      </div>
      <div class="field">
        <label>New Address</label>
        <textarea class="textarea" placeholder="Enter updated address"></textarea>
      </div>

      <div class="actions-inline">
        <a class="btn" href="../owner/delivery-tracking.html">Back to Delivery Tracking</a>
        <a class="btn primary" href="../owner/delivery-tracking.html">Save Update</a>
      </div>
    </section>
  </div>
</body>
</html>
