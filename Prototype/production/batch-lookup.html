<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bayt El Khebra | Batch Lookup</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="page">
  <div class="app-shell">
    <aside class="sidebar" data-nav="manager">
      <h2 class="logo"><span class="logo-mark">Logo</span><span class="logo-name">Bayt El Khebra</span><span class="logo-sub">Bayt El Khebra</span></h2>
      <nav></nav>
      <div class="sidebar-footer"><a class="logout-link" href="../login.html">Log Out</a></div>
    </aside>
    <main class="main">
      <header class="topbar"><h1>Batch Lookup & Search</h1><p class="topbar-user">Manager / Owner</p></header>
      <section class="table-wrap">
        <div class="table-head">
          <div class="actions-inline" style="flex: 1;">
            <div class="search-container">
              <input class="input" type="search" placeholder="Search by batch code, order ID, product, or date...">
              <button class="filter-icon" type="button">🔽</button>
              <div class="filter-dropdown">
                <div class="field">
                  <label for="batch-status">Status</label>
                  <select class="select" id="batch-status">
                    <option>All Status</option>
                    <option>Active</option>
                    <option>Completed</option>
                  </select>
                </div>
                <button class="btn primary" type="button">Apply Filters</button>
              </div>
            </div>
          </div>
          <button class="btn">Export Search Query</button>
        </div>
        <table>
          <thead><tr><th>Batch Code</th><th>Order</th><th>Client Name</th><th>Status</th><th>Date</th><th>Action</th></tr></thead>
          <tbody>
            <tr><td>B-260426-P</td><td>#1033</td><td>Client Name</td><td><span class="status pending">UNPRICED</span></td><td>26 Apr 2026</td><td><a class="btn" href="manager-order-details.html">View</a></td></tr>
            <tr><td>B-260425-M</td><td>#1032</td><td>Ahmed Store</td><td><span class="status progress">IN_PROGRESS</span></td><td>25 Apr 2026</td><td><a class="btn" href="order-work-view.html">Work View</a></td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>
  <script src="../components/nav-data.js"></script>
  <script src="../components/nav-loader.js"></script>
</body>
</html>
